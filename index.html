<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge"/>
<title></title>
</head>
 
<body>
<button id="connect">接続</button>
<button id="disconnect">切断</button>
<input id="message" value="hello" />
<button id="send">送信</button>
 
<!--script src="http://cdnjs.cloudflare.com/ajax/libs/d3/4.3.0/d3.min.js"></script-->    
<script src="https://d3js.org/d3.v4.js"></script>

<script>
var bluetoothDevice;
var characteristic;
 
//chibi:bit BLE UUID
var LED_SERVICE_UUID                        = 'e95dd91d-251d-470a-a062-fa1922dfa9a8';
var LED_TEXT_CHARACTERISTIC_UUID            = 'e95d93ee-251d-470a-a062-fa1922dfa9a8';
 
 
//ボタンイベントリスナー
d3.select("#connect").on("click", connect);
d3.select("#disconnect").on("click", disconnect);    
d3.select("#send").on("click", sendMessage);    
 
 
//chibi:bitに接続する
function connect() {
  let options = {};
 
  console.log("Connecting...")

  options.filters = [
    {services: [LED_SERVICE_UUID]}, // <- 重要
    {name: "BBC micro:bit [gavag]"}
  ];
  
  navigator.bluetooth.requestDevice(options)  
//  navigator.bluetooth.requestDevice({ acceptAllDevices:true,optionalServices:[LED_SERVICE_UUID]})
  .then(device => {
    bluetoothDevice = device;
    console.log("device", device);
    return device.gatt.connect();
  })
  .then(server =>{
    console.log("server", server)
    return server.getPrimaryService(LED_SERVICE_UUID);
  })
  .then(service => {
    console.log("service", service)
    return service.getCharacteristic(LED_TEXT_CHARACTERISTIC_UUID)
  })
  .then(chara => {
    console.log("characteristic", chara)
    alert("BLE接続が完了しました。");
    characteristic = chara;
  })  
  .catch(error => {
    console.log(error);
  });    
}
 
//LEDに表示するメッセージを送信
function sendMessage() {
  if (!bluetoothDevice || !bluetoothDevice.gatt.connected || !characteristic) return ;
  var text = document.querySelector("#message").value;
  
  console.log("writing "+text)

  var arrayBuffe = new TextEncoder().encode(text);
  characteristic.writeValue(arrayBuffe);        
}
 
 
//BEL切断処理
function disconnect() {
  if (!bluetoothDevice || !bluetoothDevice.gatt.connected) return ;
  bluetoothDevice.gatt.disconnect();
  alert("BLE接続を切断しました。")
}
 
</script>    
</body>
</html>
